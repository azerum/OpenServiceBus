name: Release

# EDIT: temporary edits:
# #1 is kept
# #2 is skipped
# #3 does only GHCR, Docker is skipped
# #4 is skipped

# Tag-driven release pipeline. Push a `v1.2.3` tag (or trigger manually with a version
# input) and this workflow:
#   1. Runs the full test suite (build must be green to ship).
#   2. Packs every library NuGet with the tag's version and publishes to GitHub Packages.
#   3. Builds the multi-arch (linux/amd64 + linux/arm64) Docker image and pushes to
#      both GHCR (ghcr.io/mauritsarissen/openservicebus) and Docker Hub
#      (mauritsarissen/openservicebus).
#   4. Creates a GitHub Release with auto-generated notes.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME - Docker Hub login
#   DOCKERHUB_TOKEN    - Docker Hub access token (NOT your password)
# GHCR + NuGet on GitHub Packages use the built-in GITHUB_TOKEN.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version (e.g. 1.2.3) - required when running manually"
        required: true
        type: string

permissions:
  contents: write # creating GitHub Releases
  packages: write # pushing NuGet to GitHub Packages, image to GHCR

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Azure Functions Core Tools (for the integration test)
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test  --no-build --configuration Release --verbosity normal

  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - id: compute
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # github.ref looks like refs/tags/v1.2.3 - strip the prefix.
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          # Sanity: bail if it doesn't look like semver. Loose check, just no slashes / spaces.
          if [[ -z "$VERSION" || "$VERSION" =~ [[:space:]/] ]]; then
            echo "Could not resolve a valid version (got '$VERSION')"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  docker:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    needs: resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4 # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Login to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mauritsarissen/openservicebus:${{ env.VERSION }}
            ghcr.io/mauritsarissen/openservicebus:latest
          labels: |
            org.opencontainers.image.title=OpenServiceBus
            org.opencontainers.image.description=Zero-dependency, embeddable Azure Service Bus emulator
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
